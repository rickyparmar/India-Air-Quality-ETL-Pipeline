version: '3.8'

x-airflow-common: &airflow-common
  build: .
  environment:
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-db:5432/${AIRFLOW_DB_NAME}
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__LOGGING__LOGGING_LEVEL=INFO
    # API configuration passed to containers
    - API_KEY=${API_KEY}
    - USE_MOCK_DATA=${USE_MOCK_DATA:-false}
    # Analytics Database Target variables
    - ANALYTICS_DB_USER=${ANALYTICS_DB_USER}
    - ANALYTICS_DB_PASSWORD=${ANALYTICS_DB_PASSWORD}
    - ANALYTICS_DB_NAME=${ANALYTICS_DB_NAME}
    - ANALYTICS_DB_HOST=${ANALYTICS_DB_HOST}
    - ANALYTICS_DB_PORT=${ANALYTICS_DB_PORT}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"

services:
  # Airflow Metadata DB (Isolated Postgres service)
  airflow-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${AIRFLOW_DB_USER}
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD}
      - POSTGRES_DB=${AIRFLOW_DB_NAME}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Target Analytical DB (Isolated Postgres service)
  analytics-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${ANALYTICS_DB_USER}
      - POSTGRES_PASSWORD=${ANALYTICS_DB_PASSWORD}
      - POSTGRES_DB=${ANALYTICS_DB_NAME}
    volumes:
      - analytics-db-data:/var/lib/postgresql/data
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql:ro
    ports:
      - "${ANALYTICS_DB_EXPOSED_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER} -d ${ANALYTICS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Airflow Webserver
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_EXPOSED_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # Airflow DB & User Initialization Container
  airflow-init:
    <<: *airflow-common
    user: "0:0"
    command: >
      bash -c "airflow db migrate && airflow users create --username '${AIRFLOW_ADMIN_USER:-admin}' --firstname Admin --lastname User --role Admin --email admin@example.com --password '${AIRFLOW_ADMIN_PASSWORD:-admin_password}'"
    depends_on:
      airflow-db:
        condition: service_healthy

volumes:
  airflow-db-data:
  analytics-db-data:
